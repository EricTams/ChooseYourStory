{% extends 'layout.html' %}
{% block title %}{{ story.title }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="/game/css/style.css">
<style>
  body { background: #f3f4f6; color: #1f2937; line-height: 1.5; }

  .toolbar {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.5rem 1rem; background: #fff; border-bottom: 1px solid #e5e7eb;
  }
  .toolbar a { color: #4f46e5; text-decoration: none; font-size: 0.85rem; }
  .toolbar input { max-width: 200px; font-size: 0.85rem; padding: 0.3rem 0.5rem; }
  .toolbar select { font-size: 0.85rem; padding: 0.3rem; max-width: 180px; }
  .toolbar .spacer { flex: 1; }

  .reader-view { background: #f5f0e8; min-height: calc(100vh - 95px); }

  /* Editable title/text — game CSS sets fonts via .scene-title / .scene-text */
  .reader-view .scene-title {
    display: block; width: 100%;
    background: transparent; border: none; border-bottom: 2px solid transparent;
    border-radius: 0; padding: 0.1rem 0; outline: none;
  }
  .reader-view .scene-title:focus { border-bottom-color: #c8bfb0; }
  .reader-view .scene-title::placeholder { color: #c8bfb0; }

  .reader-view .scene-text {
    display: block; width: 100%; min-height: 120px;
    background: transparent; border: none; border-left: 2px solid transparent;
    border-radius: 0; padding: 0.2rem 0 0.2rem 0.6rem;
    outline: none; resize: vertical;
  }
  .reader-view .scene-text:focus { border-left-color: #c8bfb0; }
  .reader-view .scene-text::placeholder { color: #c8bfb0; }

  /* Image prompt row */
  .image-prompt-row {
    display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .image-prompt-row input {
    flex: 1; font-size: 0.9rem; padding: 0.5rem 0.7rem;
    border: 1px solid #d4cbbf; border-radius: 8px; background: #faf7f2;
  }
  .image-prompt-row input:focus {
    outline: none; border-color: #7c5cbf;
    box-shadow: 0 0 0 2px rgba(124,92,191,0.15);
  }
  .image-prompt-row input::placeholder { color: #b5a998; }
  .gen-status { font-size: 0.8rem; margin-top: -1rem; margin-bottom: 1rem; min-height: 1.2em; }
  .gen-status.error { color: #dc2626; }
  .gen-status.ok { color: #059669; }
  .gen-status.wait { color: #8a7a6a; }

  .no-image {
    background: #ece6da; color: #a89b8a; text-align: center;
    padding: 3rem 1rem; border-radius: 12px; font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  /* Choice editor rows styled like game buttons */
  .choice-edit-row {
    display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem;
  }
  .choice-label {
    flex: 1; padding: 0.75rem 1rem;
    border: 2px solid #5b8c5a; border-radius: 8px;
    font-size: 1rem; color: #3a5a38; background: transparent;
    font-family: system-ui, sans-serif;
  }
  .choice-label:focus { outline: none; box-shadow: 0 0 0 2px rgba(91,140,90,0.2); }
  .choice-label::placeholder { color: #9cb89b; }
  .choice-arrow { color: #b0b0b0; }
  .choice-target {
    width: 100px; font-family: monospace; font-size: 0.8rem; padding: 0.4rem 0.5rem;
    border: 1px solid #d4cbbf; border-radius: 6px; background: #faf7f2;
  }
  .choice-target:focus { outline: none; border-color: #7c5cbf; }
  .choice-nav, .choice-del {
    background: none; border: none; cursor: pointer; font-size: 1rem;
    color: #b0b0b0; padding: 0.3rem; transition: color 0.15s;
  }
  .choice-nav:hover { color: #4f46e5; }
  .choice-del:hover { color: #dc2626; }

  #add-choice { margin-top: 0.3rem; }

  .placeholder-msg {
    text-align: center; padding: 6rem 1rem;
    font-family: Georgia, serif; font-size: 1.1rem;
    color: #a89b8a; font-style: italic;
  }

  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #065f46; color: #fff;
    padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
{% endblock %}

{% block content %}
<div class="toolbar">
  <a href="/">&larr; Stories</a>
  <input type="text" id="story-title" value="{{ story.title }}" placeholder="Story title">
  <select id="scene-select"><option value="">-- pick scene --</option></select>
  <button id="new-scene" class="btn btn-primary btn-sm">+ New Scene</button>
  <div class="spacer"></div>
  <button id="save" class="btn btn-primary btn-sm">Save</button>
  <a href="/game/index.html" target="_blank" class="btn btn-secondary btn-sm">Preview</a>
</div>

<div class="reader-view">
  <div id="empty-msg" class="placeholder-msg">
    <p>Create your first scene to start writing.</p>
  </div>

  <div id="page" class="scene" style="display:none;">
    <div id="image-area"></div>
    <div class="image-prompt-row">
      <input type="text" id="image-prompt" placeholder="Describe the image you want to see...">
      <button id="gen-btn" class="btn btn-primary btn-sm">Generate</button>
    </div>
    <div id="gen-status" class="gen-status"></div>

    <input type="text" id="scene-title" class="scene-title" placeholder="Scene Title">
    <textarea id="scene-text" class="scene-text" placeholder="Write your story here..."></textarea>

    <div id="choices-area" style="margin-top:2rem;">
      <div id="choices-list"></div>
      <button id="add-choice" class="btn btn-secondary btn-sm">+ Add option</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">Saved</div>

<script>
const story = {{ story | tojson }};
let currentId = null;

const $ = (id) => document.getElementById(id);

function init() {
  renderSelector();
  $('new-scene').addEventListener('click', addScene);
  $('save').addEventListener('click', save);
  $('gen-btn').addEventListener('click', generateArt);
  $('add-choice').addEventListener('click', () => addChoiceRow('', ''));
  $('scene-select').addEventListener('change', (e) => {
    if (e.target.value) switchScene(e.target.value);
  });

  if (story.startScene && story.scenes[story.startScene]) {
    switchScene(story.startScene);
  }
}

// ── Scene selector ──────────────────────────────────────────────

function renderSelector() {
  const sel = $('scene-select');
  const val = sel.value;
  sel.innerHTML = '<option value="">-- pick scene --</option>';
  for (const [id, sc] of Object.entries(story.scenes)) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = sc.title || id;
    sel.appendChild(opt);
  }
  sel.value = val || currentId || '';
  updateDatalist();
}

function updateDatalist() {
  let dl = document.getElementById('scene-dl');
  if (!dl) { dl = document.createElement('datalist'); dl.id = 'scene-dl'; document.body.appendChild(dl); }
  dl.innerHTML = '';
  for (const id of Object.keys(story.scenes)) {
    const o = document.createElement('option'); o.value = id; dl.appendChild(o);
  }
}

// ── Switch / create scenes ──────────────────────────────────────

function switchScene(id) {
  if (currentId) collect();
  currentId = id;
  const sc = story.scenes[id];
  if (!sc) return;

  $('scene-title').value = sc.title || '';
  $('scene-text').value = sc.text || '';
  $('image-prompt').value = '';
  $('gen-status').textContent = '';
  renderImage(sc.image);
  renderChoices(sc.choices || []);

  $('empty-msg').style.display = 'none';
  $('page').style.display = 'block';
  $('scene-select').value = id;

  autoSize($('scene-text'));
}

function addScene() {
  const name = prompt('Scene name (e.g. dark_forest):');
  if (!name) return;
  const id = name.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
  if (!id) return;
  if (story.scenes[id]) { alert('Already exists.'); return; }
  story.scenes[id] = { title: '', text: '', image: '', choices: [] };
  if (!story.startScene) story.startScene = id;
  renderSelector();
  switchScene(id);
  saveToServer();
}

// ── Image ───────────────────────────────────────────────────────

function renderImage(path) {
  const area = $('image-area');
  if (path) {
    area.innerHTML = `<img class="scene-image" src="/game/${path}?t=${Date.now()}" alt="">`;
  } else {
    area.innerHTML = '<div class="no-image">No image yet</div>';
  }
}

async function generateArt() {
  if (!currentId) return;
  const prompt = $('image-prompt').value.trim();
  if (!prompt) { $('image-prompt').focus(); return; }

  const status = $('gen-status');
  const btn = $('gen-btn');
  btn.disabled = true;
  status.textContent = 'Generating\u2026 this may take a minute.';
  status.className = 'gen-status wait';

  try {
    const res = await fetch(`/api/stories/${story.slug}/generate-art`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scene_id: currentId, prompt, provider: 'openai' }),
    });
    const data = await res.json();
    if (!res.ok) { status.textContent = data.error || 'Failed'; status.className = 'gen-status error'; return; }
    story.scenes[currentId].image = data.image;
    renderImage(data.image);
    status.textContent = 'Done!';
    status.className = 'gen-status ok';
  } catch (e) {
    status.textContent = e.message;
    status.className = 'gen-status error';
  } finally {
    btn.disabled = false;
  }
}

// ── Choices ─────────────────────────────────────────────────────

function renderChoices(choices) {
  $('choices-list').innerHTML = '';
  for (const c of choices) addChoiceRow(c.text, c.target);
}

function addChoiceRow(text, target) {
  const row = document.createElement('div');
  row.className = 'choice-edit-row';

  const label = document.createElement('input');
  label.type = 'text'; label.className = 'choice-label';
  label.value = text; label.placeholder = 'Option text';

  const arrow = document.createElement('span');
  arrow.className = 'choice-arrow'; arrow.textContent = '\u2192';

  const tgt = document.createElement('input');
  tgt.type = 'text'; tgt.className = 'choice-target';
  tgt.value = target; tgt.placeholder = 'scene'; tgt.setAttribute('list', 'scene-dl');

  const nav = document.createElement('button');
  nav.className = 'choice-nav'; nav.textContent = '\u2197'; nav.title = 'Go to scene';
  nav.addEventListener('click', () => goToTarget(tgt.value));

  const del = document.createElement('button');
  del.className = 'choice-del'; del.textContent = '\u00d7'; del.title = 'Remove';
  del.addEventListener('click', () => row.remove());

  row.append(label, arrow, tgt, nav, del);
  $('choices-list').appendChild(row);
}

function goToTarget(target) {
  if (!target) return;
  collect();
  if (!story.scenes[target]) {
    if (!confirm(`"${target}" doesn\u2019t exist yet. Create it?`)) return;
    story.scenes[target] = { title: '', text: '', image: '', choices: [] };
    renderSelector();
    saveToServer();
  }
  switchScene(target);
}

function readChoices() {
  const rows = $('choices-list').querySelectorAll('.choice-edit-row');
  const out = [];
  for (const row of rows) {
    const text = row.querySelector('.choice-label').value.trim();
    const target = row.querySelector('.choice-target').value.trim();
    if (text || target) out.push({ text, target });
  }
  return out;
}

// ── Collect & save ──────────────────────────────────────────────

function collect() {
  if (!currentId || !story.scenes[currentId]) return;
  const sc = story.scenes[currentId];
  sc.title = $('scene-title').value.trim();
  sc.text = $('scene-text').value;
  sc.choices = readChoices();
  story.title = $('story-title').value.trim() || story.title;
}

async function save() {
  collect();
  renderSelector();
  await saveToServer();
}

async function saveToServer() {
  const res = await fetch(`/api/stories/${story.slug}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(story),
  });
  toast(res.ok ? 'Saved' : 'Save failed');
}

// ── Utilities ───────────────────────────────────────────────────

function autoSize(el) {
  const resize = () => { el.style.height = 'auto'; el.style.height = Math.max(120, el.scrollHeight) + 'px'; };
  resize();
  el.addEventListener('input', resize);
}

function toast(msg) {
  const t = $('toast'); t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

init();
</script>
{% endblock %}
